<!DOCTYPE html>
<html>
    <head>
        <title>Stock Day Trades</title>
        <link rel="stylesheet" href="../styles/stock_day_trades.css">
        <script src="../scripts/stock_day_trades.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
    </head>
    <body>
        <header class="header">
            
        </header>
        <div class="overallPerformance">
            <div class="card"><p>P&amp;L</p> <h2>$</h2><h2 id="OverallPL">No Data</h2></div>
            <div class="card"><p>Win Rate:</p> <h2 id="OverallWinPercentage">No Data</h2><h2>%</h2></div>
            <div class="card"><p>Avg Win / Avg Loss</p> <h2>$</h2><h2 id="OverallAverageWin">No Data</h2> <h2>/ -$</h2><h2 id="OverallAverageLoss">No Data</h2></div>
            <div class="card"><p>Profit Factor:</p> <h2 id="OverallProfitFactor"></h2></div>
        </div>

        <div class="chartCard"><canvas id="dailyAccountBalance"></canvas></div>
        <div class="chartCard"><canvas id="weeklyBarChart"></canvas></div>
    </body>
</html>
